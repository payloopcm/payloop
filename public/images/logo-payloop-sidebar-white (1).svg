<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 60">
  <!-- Logo P + "PayLoop" en BLANC pour sidebar sombre (SANS fond, SANS cadre) -->
  
  <!-- Icône P avec boucle (BLANC) -->
  <g transform="translate(10, 10)">
    <!-- Barre verticale du P -->
    <rect x="0" y="0" width="6" height="45" fill="#ffffff" rx="3"/>
    
    <!-- Boucle circulaire -->
    <circle cx="18" cy="15" r="13.5" fill="none" stroke="#ffffff" stroke-width="6"/>
  </g>
  
  <!-- Texte "PayLoop" (BLANC, compact) -->
  <text x="50" y="40" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">
    PayLoop
  </text>
</svg>