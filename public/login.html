<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - PayLoop</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8">
            <!-- Logo -->
            <div class="text-center">
                <img src="images/logo-payloop-sidebar-white.svg" alt="PayLoop" class="mx-auto h-16 w-auto mb-4 filter brightness-0">
                <h1 class="text-3xl font-bold text-gray-900">PayLoop</h1>
                <p class="mt-2 text-sm text-gray-600">Connectez-vous à votre compte</p>
            </div>

            <!-- Tabs -->
            <div class="flex border-b border-gray-200">
                <button id="loginTab" onclick="showLogin()" class="flex-1 py-2 px-4 text-center border-b-2 border-green-600 text-green-600 font-medium">
                    Connexion
                </button>
                <button id="registerTab" onclick="showRegister()" class="flex-1 py-2 px-4 text-center border-b-2 border-transparent text-gray-500 hover:text-gray-700">
                    Inscription
                </button>
            </div>

            <!-- Login Form -->
            <div id="loginFormContainer" class="bg-white py-8 px-6 shadow rounded-lg">
                <form id="loginForm" class="space-y-6">
                    <div>
                        <label for="loginEmail" class="block text-sm font-medium text-gray-700">Email</label>
                        <input id="loginEmail" type="email" required 
                               class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-500 focus:border-green-500"
                               placeholder="ibrahim@payloop.cm" />
                    </div>

                    <div>
                        <label for="loginPassword" class="block text-sm font-medium text-gray-700">Mot de passe</label>
                        <input id="loginPassword" type="password" required
                               class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-500 focus:border-green-500" />
                    </div>

                    <div id="loginError" class="hidden text-red-600 text-sm"></div>
                    <div id="loginSuccess" class="hidden text-green-600 text-sm"></div>

                    <button type="submit" id="loginButton"
                            class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-green-600 hover:bg-green-700 focus:outline-none">
                        Se connecter
                    </button>
                </form>
            </div>

            <!-- Register Form -->
            <div id="registerFormContainer" class="hidden bg-white py-8 px-6 shadow rounded-lg">
                <form id="registerForm" class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label for="registerFirstName" class="block text-sm font-medium text-gray-700">Prénom</label>
                            <input id="registerFirstName" type="text" required
                                   class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-500 focus:border-green-500" />
                        </div>
                        <div>
                            <label for="registerLastName" class="block text-sm font-medium text-gray-700">Nom</label>
                            <input id="registerLastName" type="text" required
                                   class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-500 focus:border-green-500" />
                        </div>
                    </div>

                    <div>
                        <label for="registerEmail" class="block text-sm font-medium text-gray-700">Email</label>
                        <input id="registerEmail" type="email" required
                               class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-500 focus:border-green-500" />
                    </div>

                    <div>
                        <label for="registerPassword" class="block text-sm font-medium text-gray-700">Mot de passe</label>
                        <input id="registerPassword" type="password" required minlength="6"
                               class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-500 focus:border-green-500" />
                        <p class="mt-1 text-xs text-gray-500">Minimum 6 caractères</p>
                    </div>

                    <div id="registerError" class="hidden text-red-600 text-sm"></div>
                    <div id="registerSuccess" class="hidden text-green-600 text-sm"></div>

                    <button type="submit" id="registerButton"
                            class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-green-600 hover:bg-green-700 focus:outline-none">
                        S'inscrire
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://payloop-api-production.up.railway.app/api';

        // Switch tabs
        function showLogin() {
            document.getElementById('loginFormContainer').classList.remove('hidden');
            document.getElementById('registerFormContainer').classList.add('hidden');
            document.getElementById('loginTab').classList.add('border-green-600', 'text-green-600');
            document.getElementById('loginTab').classList.remove('border-transparent', 'text-gray-500');
            document.getElementById('registerTab').classList.remove('border-green-600', 'text-green-600');
            document.getElementById('registerTab').classList.add('border-transparent', 'text-gray-500');
        }

        function showRegister() {
            document.getElementById('loginFormContainer').classList.add('hidden');
            document.getElementById('registerFormContainer').classList.remove('hidden');
            document.getElementById('registerTab').classList.add('border-green-600', 'text-green-600');
            document.getElementById('registerTab').classList.remove('border-transparent', 'text-gray-500');
            document.getElementById('loginTab').classList.remove('border-green-600', 'text-green-600');
            document.getElementById('loginTab').classList.add('border-transparent', 'text-gray-500');
        }

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            const successDiv = document.getElementById('loginSuccess');
            const button = document.getElementById('loginButton');

            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');
            button.textContent = 'Connexion...';
            button.disabled = true;

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Erreur de connexion');
                }

                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));

                successDiv.textContent = 'Connexion réussie ! Redirection...';
                successDiv.classList.remove('hidden');

                setTimeout(() => {
                    window.location.href = '/dashboard.html';
                }, 1000);

            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('hidden');
                button.textContent = 'Se connecter';
                button.disabled = false;
            }
        });

        // Register
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const firstName = document.getElementById('registerFirstName').value;
            const lastName = document.getElementById('registerLastName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const errorDiv = document.getElementById('registerError');
            const successDiv = document.getElementById('registerSuccess');
            const button = document.getElementById('registerButton');

            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');
            button.textContent = 'Inscription...';
            button.disabled = true;

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, first_name: firstName, last_name: lastName })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Erreur lors de l\'inscription');
                }

                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));

                successDiv.textContent = 'Inscription réussie ! Redirection...';
                successDiv.classList.remove('hidden');

                setTimeout(() => {
                    window.location.href = '/dashboard.html';
                }, 1000);

            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('hidden');
                button.textContent = 'S\'inscrire';
                button.disabled = false;
            }
        });
    </script>
</body>
</html>
