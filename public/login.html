<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PayLoop - Connexion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0D6E4F 0%, #1A2332 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .login-container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 400px;
    }
    
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .logo h1 {
      color: #0D6E4F;
      font-size: 32px;
      margin-bottom: 8px;
    }
    
    .logo p {
      color: #666;
      font-size: 14px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
    }
    
    .form-group input, .form-group select {
      width: 100%;
      padding: 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: #0D6E4F;
    }
    
    .btn {
      width: 100%;
      padding: 14px;
      background: #0D6E4F;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }
    
    .btn:hover {
      background: #095C40;
    }
    
    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    
    .error {
      background: #ffe6e6;
      color: #c00;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }
    
    .register-link {
      text-align: center;
      margin-top: 20px;
      color: #666;
    }
    
    .register-link a {
      color: #0D6E4F;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <h1>💰 PayLoop</h1>
      <p>Gestion automatisée pour PME africaines</p>
    </div>
    
    <div class="error" id="error"></div>
    
    <form id="loginForm">
      <div class="form-group">
        <label>Sélectionnez votre boutique</label>
        <select id="merchantSelect" required>
          <option value="">Chargement...</option>
        </select>
      </div>
      
      <button type="submit" class="btn" id="loginBtn">Accéder au Dashboard</button>
    </form>
    
    <p class="register-link">
      Nouveau ? <a href="register.html">Créer une boutique</a>
    </p>
  </div>

  <script>
    const API = window.location.origin;
    
    // Charger la liste des marchands
    async function loadMerchants() {
      try {
        const res = await fetch(`${API}/merchants`);
        const merchants = await res.json();
        
        const select = document.getElementById('merchantSelect');
        
        if (merchants.length === 0) {
          select.innerHTML = '<option value="">Aucune boutique - Créez-en une</option>';
        } else {
          select.innerHTML = '<option value="">-- Choisir --</option>';
          merchants.forEach(m => {
            select.innerHTML += `<option value="${m.id}">${m.name}</option>`;
          });
        }
      } catch (err) {
        console.error(err);
      }
    }
    
    // Connexion
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      
      const merchantId = document.getElementById('merchantSelect').value;
      
      if (!merchantId) {
        document.getElementById('error').textContent = 'Veuillez sélectionner une boutique';
        document.getElementById('error').style.display = 'block';
        return;
      }
      
      // Stocker l'ID et rediriger
      localStorage.setItem('merchantId', merchantId);
      window.location.href = 'dashboard.html';
    });
    
    // Charger au démarrage
    loadMerchants();
  </script>
</body>
</html>
